# SOUL Configuration
# This file defines all gameplay settings for the SOUL plugin.
# Changes take effect after staff reload game config (@config/load or the
# equivalent web portal action) - no plugin restart needed. See
# docs/reference/Configuration.md for the full reference and
# docs/spec/SOUL_LLM_Implementation_Specification_FINAL.md /
# docs/spec/Implementation_Specification_Addendum.md for the mechanics
# behind each setting.

soul:
  enabled: true

  # Permission required for staff SOUL administration: award/correct XP,
  # manage the Boon/Bane catalogue, correct Resonance, review the
  # Character Framework. Defaults to "manage_jobs", the same broad
  # staff-administration permission the Jobs plugin uses. Change this if
  # your game wants a narrower, dedicated SOUL-admin permission - see
  # docs/reference/Permissions.md.
  manage_permission: manage_jobs

  # Ordinary player actions (view your own Sheet, spend XP, make rolls,
  # browse the B&B catalogue) are available to any approved character by
  # default - no permission needed. Set play_permission to also grant
  # play access to characters who don't have that permission (e.g. to
  # let staff or beta-testers use SOUL before their own character is
  # approved). Leave unset/commented for the default (approved only).
  # play_permission: manage_jobs

  # Permission required to review/approve GM-assisted pending rolls.
  # Defaults to "manage_scenes", the real permission the Scenes plugin
  # already uses for scene-authority staff.
  gm_review_permission: manage_scenes

  # ==========================================================================
  # Character Framework
  # ==========================================================================

  framework:
    skill_min_rating: 0
    skill_max_rating: 10   # Ultimate cap at every Resonance tier (FINAL REQ-010)

    aspects:
      body:
        name: "Body"
        description: "Physical capability and endurance"
        order: 1
      mind:
        name: "Mind"
        description: "Intellect, perception, and reason"
        order: 2
      spirit:
        name: "Spirit"
        description: "Willpower, emotional depth, and the arcane"
        order: 3

    # Skills map to exactly one Aspect by stable key (FINAL REQ-010).
    # Starter set below - expand freely to fit your game's setting.
    skills:
      strength:
        name: "Strength"
        aspect: "body"
        order: 1
      reflexes:
        name: "Reflexes"
        aspect: "body"
        order: 2
      stamina:
        name: "Stamina"
        aspect: "body"
        order: 3
      investigation:
        name: "Investigation"
        aspect: "mind"
        order: 1
      empathy:
        name: "Empathy"
        aspect: "mind"
        order: 2
      academics:
        name: "Academics"
        aspect: "mind"
        order: 3
      resolve:
        name: "Resolve"
        aspect: "spirit"
        order: 1
      ceremonial_magic:
        name: "Ceremonial Magic"
        aspect: "spirit"
        order: 2
      presence:
        name: "Presence"
        aspect: "spirit"
        order: 3

  # ==========================================================================
  # Aspect Roll Contribution
  # ==========================================================================

  aspect:
    weight: 0.20
    contribution_rounding: "nearest"

  # ==========================================================================
  # Resonance
  # ==========================================================================

  resonance:
    enabled: true
    min: -3
    max: 3
    r0_skill_points: 15
    r0_starting_cap: 7
    positive_skill_points_per_level: 2
    negative_skill_points_per_level: 2
    positive_starting_cap_per_level: 1
    negative_starting_cap_per_level: 1
    review_flag_at_extremes: true

  # ==========================================================================
  # XP
  # ==========================================================================

  xp:
    weekly_award: 1
    scene_sharer_award: 2
    scene_participant_award: 1
    forum_award: 1

    # Standard Ares cron format (see
    # https://www.aresmush.com/tutorials/code/cron.html) - checked every
    # minute via Cron.is_cron_match?, same mechanism FS3Skills' own
    # xp_cron and Inklings' inkling_xp_cron use. Default below runs
    # weekly, Sunday at midnight.
    weekly_award_cron:
      day_of_week:
        - Sun
      hour:
        - 0
      minute:
        - 0

    cost:
      skill_curve_numerator: 1
      skill_curve_denominator: 2
      development_base: 1
      development_scale: 250
      development_exponent: 1.25
      negative_resonance_rate: 0.12
      positive_resonance_rate: 0.22
      positive_resonance_surcharge: 1

    # Catch-up eligibility (median comparison) is recalculated live on
    # every award - see SoulXpApi.catchup_eligible? - so no separate
    # recalculation schedule is needed beyond weekly_award_cron above.
    catchup:
      enabled: true
      multiplier: 2.0
      grace_period_weeks: 0
      sources_excluded:
        - manual_grant

  # ==========================================================================
  # Boons & Banes
  # ==========================================================================

  bnb:
    # B&B category (independent of kind - a Boon and a Bane can share a
    # category). Fully configurable; these are just the defaults.
    categories:
      - "Arcane"
      - "Mundane"

    level_definitions:
      minor:
        modifier: 1
        chargen_available: true
      major:
        modifier: 2
        chargen_available: true
      legendary:
        modifier: 3
        chargen_available: true
      negated:
        modifier: 0
        chargen_available: false
      epic:
        modifier: null   # SHALL be explicitly configured per-entry; no implied value
        chargen_available: false

    definition_defaults:
      chargen_available: true
      flag_for_review: false
      modifier_eligible: false

    chargen_ratio: 2            # 1 qualifying Bane required per 2 Boons
    ratio_rounding: "floor"

    resonance_levels:
      r_minus_3:
        boons: { max_count: 0, max_at_level_2: 0, max_at_level_3: 0 }
        banes: { max_count: null, max_at_level_2: 3, max_at_level_3: 3 }
      r_minus_2:
        boons: { max_count: 0, max_at_level_2: 0, max_at_level_3: 0 }
        banes: { max_count: null, max_at_level_2: 2, max_at_level_3: 2 }
      r_minus_1:
        boons: { max_count: 1, max_at_level_2: 0, max_at_level_3: 0 }
        banes: { max_count: null, max_at_level_2: 2, max_at_level_3: 1 }
      r_0:
        boons: { max_count: 2, max_at_level_2: 1, max_at_level_3: 0 }
        banes: { max_count: null, max_at_level_2: 1, max_at_level_3: 0 }
      r_1:
        boons: { max_count: 3, max_at_level_2: 2, max_at_level_3: 0 }
        banes: { max_count: null, max_at_level_2: 2, max_at_level_3: 1 }
      r_2:
        boons: { max_count: 3, max_at_level_2: 3, max_at_level_3: 1 }
        banes: { max_count: null, max_at_level_2: 3, max_at_level_3: 2 }
      r_3:
        boons: { max_count: 4, max_at_level_2: 3, max_at_level_3: 2 }
        banes: { max_count: null, max_at_level_2: 3, max_at_level_3: 3 }

  # ==========================================================================
  # Rolls
  # ==========================================================================

  rolls:
    random_model: "d20_open_ended"

    difficulties:
      trivial: 11
      easy: 12
      standard: 13
      difficult: 17
      hard: 21
      extreme: 25
      legendary: 34
      mythic: 40

    explosion:
      enabled: true
      trigger: "double_20"

    implosion:
      enabled: true
      trigger: "double_1"

    boon_bane:
      max_positive_modifier: null   # No cap; intentional
      max_negative_modifier: null   # No cap; intentional

    extraordinary_result_threshold: 0.0001
    extraordinary_result_good: "In a shocking display of good luck"
    extraordinary_result_bad: "In a fit of bad luck"

    degrees_of_success:
      exceptional_success_min: 10
      success_min: 0
      complicated_success_min: -5
      lucky_failure_min: -10
      # Addendum §8.1's table gives Failure and Catastrophic Failure the same
      # "margin < -10" condition with no boundary between them - a gap, not a
      # locked decision (see CLAUDE_ADR.md). Resolved by mirroring the
      # Success/Exceptional Success split: Success is a 10-point band above
      # 0, so Failure is a 10-point band below lucky_failure_min, and
      # Catastrophic Failure is whatever remains beyond that.
      failure_min: -20
      catastrophic_failure_min: -20

    output_mode: "gm_led"   # alternatives: "gm_less", "hybrid"

    pending_roll_timeout_hours: 720
    auto_failure_on_expiry: false
    max_pending_rolls_per_player: 1
    max_pending_rolls_per_player_gm: 2

    gm_scene_policy: "optional"   # "required", "optional", or "unavailable"

  # ==========================================================================
  # Privacy
  # ==========================================================================

  privacy:
    gm_reveal_categories:
      - "name"
      - "public_description"
    warn_on_broader_reveal: true

  # ==========================================================================
  # Culminations
  # ==========================================================================

  culminations:
    approval_required: true

  # ==========================================================================
  # Notifications
  # ==========================================================================

  notifications:
    character_facing_success: true

  # ==========================================================================
  # Integrations
  # ==========================================================================

  integrations:
    inklings:
      enabled: true
      inspiration_cost: 0
    grimoire:
      enabled: true
      # Maps a Grimoire spell branch key to an existing SOUL Skill key
      # (FINAL REQ-040: "map configured Grimoire branches to Spirit Skills"
      # - no dedicated Arcana Skill is created; Grimoire re-purposes whatever
      # Skill(s) a game already defines). Empty by default; a game enabling
      # Grimoire integration configures its own branch names here.
      # Example:
      #   branch_skill_map:
      #     evocation: "ceremonial_magic"
      #     divination: "ceremonial_magic"
      branch_skill_map: {}

  shortcuts: {}
